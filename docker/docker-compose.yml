services:
  db:
    image: postgres:16-alpine
    container_name: fincore_db
    environment:
      - POSTGRES_DB=fincore
      - POSTGRES_USER=fincore
      - POSTGRES_PASSWORD=fincore
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fincore"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fincore_redis
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  django:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fincore_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
      - static_data:/app/staticfiles
    ports:
      - "${HOST_DJANGO_PORT:-8000}:8000"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fincore_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ../backend:/app
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fincore_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ../backend:/app
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  static_data:
